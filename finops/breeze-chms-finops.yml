meters:
- name: subscription
  description: Flat monthly Breeze subscription; includes API access at no extra charge.
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: text_messages
  description: Text messages sent; billed per message above the monthly allowance.
  unit: messages
  aggregation: sum
  dimensions:
  - account
- name: giving_transactions
  description: Online / text giving transactions; billed as a percentage processing fee per donation.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - fund
principles:
- name: Visibility
  description: Track the flat subscription as a fixed cost and monitor variable text-messaging and giving-processing fees monthly.
- name: Allocation
  description: Attribute giving-processing fees by fund to see the net cost of each fund's online giving.
- name: Optimization
  description: Stay within the included text-message allowance and cache API reads to avoid rate-limit-driven retries; the API adds no marginal cost so there is nothing to optimize per call.
- name: Accountability
  description: Assign an owner for the subscription and for reviewing messaging and giving-fee variance against budget.
