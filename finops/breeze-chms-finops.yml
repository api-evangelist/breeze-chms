description: >-
  FinOps view of Breeze ChMS spend. Breeze bills a single flat monthly
  subscription that includes unlimited people, unlimited users, all features,
  support, the mobile app, and full REST API access, with no setup or
  termination fees. Because the API is included in the flat rate, API usage
  itself carries no marginal charge - the request-rate limit (~20/min) governs
  throughput rather than cost. The only usage-based components are text
  messaging above the monthly allowance (per-message overage) and per-
  transaction processing fees on online / text giving. For most churches the
  dominant, predictable cost is the flat subscription; variable cost tracking
  focuses on messaging volume and giving-processing fees.
notes: >-
  Verify the current monthly rate, text-message overage rate, and giving
  transaction fee schedule on breezechms.com/pricing. No per-API-call billing
  exists; optimize for the shared rate limit rather than for cost per request.
