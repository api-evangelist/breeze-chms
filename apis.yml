aid: breeze-chms
url: https://raw.githubusercontent.com/api-evangelist/breeze-chms/refs/heads/main/apis.yml
name: Breeze ChMS
kind: company
description: Breeze ChMS is church management software (breezechms.com) for small and
  mid-sized churches, covering people/membership, tags and groups, events and calendars,
  check-ins and attendance, online and text giving, funds, pledge campaigns, custom
  forms, and volunteer scheduling. Breeze publishes a documented REST API scoped to
  each church subdomain (https://{subdomain}.breezechms.com/api), authenticated with
  an account API key sent in the Api-Key HTTP header. All API operations are HTTP GET
  requests with query-string parameters, and the API is rate limited to roughly 20
  requests per minute.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
