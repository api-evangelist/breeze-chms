aid: breeze-chms
name: Breeze ChMS
review:
  question: Does Breeze expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Breeze's entire public API surface is
    request/response REST over HTTPS, delivered as HTTP GET calls with
    query-string parameters, scoped to a church subdomain
    (https://{subdomain}.breezechms.com/api) and authenticated with an Api-Key
    header. There is no server-push transport (WebSocket or SSE) and no
    published webhook/event stream on Breeze's own API to model, so there is no
    event-driven surface for an AsyncAPI document to describe.
findings:
  summary: |
    Breeze ChMS does not publish a documented public WebSocket API. Breeze is
    church management software (breezechms.com) whose developer API is a
    documented REST API scoped per church subdomain
    (https://{subdomain}.breezechms.com/api). Every operation - people, tags,
    events, check-in/attendance, giving (contributions), funds, pledge
    campaigns, forms, volunteers, and account - is an HTTP GET request with
    query-string parameters, authenticated by an account API key sent in the
    Api-Key HTTP header (obtained by the Account Owner under Manage Account >
    API Key). The API is rate limited to roughly 20 requests per minute
    (Breeze recommends ~3.5 seconds between calls). No realtime, bidirectional,
    or streaming WebSocket (ws:// or wss://) endpoint is documented anywhere in
    Breeze's API reference, and no public webhook or SSE surface is documented
    either.
  openSource: |
    Breeze itself is proprietary SaaS; there is no official open-source Breeze
    server or client. Community REST wrappers exist (for example the Python
    pyBreezeChMS / breeze-chms-api libraries and a Node.js breeze-chms package),
    but these are third-party and simply call the same documented REST endpoints
    over the Api-Key header.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://{subdomain}.breezechms.com/api
      documented: true
      note: Entire public API. HTTP GET with query-string params; Api-Key header auth. Scoped to the church subdomain.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Breeze API reference as of the review date.
    - protocol: Webhook
      scheme: https
      documented: false
      note: No public outbound webhook / event-callback API is documented on Breeze's own API.
    - protocol: SSE
      scheme: https
      documented: false
      note: No server-sent-events streaming surface is documented.
