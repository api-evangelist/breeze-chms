actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push protocol surface exists; Breeze's own
    public API is entirely request/response REST (HTTP GET with query-string
    parameters, Api-Key header). No AsyncAPI document was created because there
    is no event-driven or streaming transport on Breeze's own API to model.
