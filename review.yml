    API reference guide (app.breezechms.com/api) and corroborated by the
    community pyBreezeChMS wrapper, which maps directly to the documented
    routes (contributions use the /giving/* paths). The endpointsModeled list
    covers additional documented tag / event / volunteer / family write
    operations included in the reference guide; their exact parameter sets were
    modeled from the reference-guide summary and should be re-verified against
    the live per-account reference during reconciliation.
sources:
